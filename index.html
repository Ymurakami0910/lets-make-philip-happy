<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finance Quiz — BCIT CREA-7120</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="window.__katexReady=true;renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --bg: #f9f8f6;
  --surface: #ffffff;
  --border: #e8e6e1;
  --border-strong: #d4d0c8;
  --text: #1a1916;
  --text-muted: #6b6860;
  --text-faint: #a09d97;
  --accent: #2d6a4f;
  --accent-light: #e8f5ee;
  --accent-hover: #245a42;
  --warn: #b5590a;
  --warn-light: #fff3e8;
  --info: #1a56a0;
  --info-light: #e8f0fb;
  --correct: #2d6a4f;
  --correct-bg: #e8f5ee;
  --correct-border: #a8d8be;
  --wrong: #c0392b;
  --wrong-bg: #fdecea;
  --wrong-border: #f5c0bb;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.18);
  --radius: 10px;
  --radius-lg: 20px;
  --font-body: 'Geist', sans-serif;
  --font-serif: 'Instrument Serif', serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── LOADING / ERROR SCREENS ── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 16px;
  color: var(--text-muted);
}
.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label { font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

.error-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 12px; padding: 40px; text-align: center;
}
.error-icon { font-size: 40px; }
.error-title { font-family: var(--font-serif); font-size: 24px; color: var(--wrong); }
.error-msg { font-size: 13px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }
.error-btn { margin-top: 8px; padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; }
.error-btn:hover { background: var(--accent-hover); }

/* ── HEADER ── */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.app-logo { font-family: var(--font-serif); font-size: 18px; color: var(--text); }
.app-logo span { color: var(--accent); }
.header-meta { display: flex; gap: 8px; align-items: center; }
.quiz-counter {
  font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
  background: var(--bg); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
}
.quiz-counter.good { border-color: var(--correct-border); color: var(--correct); background: var(--correct-bg); }

.progress-bar { height: 3px; background: var(--border); }
.progress-fill { height: 100%; background: var(--accent); transition: width .5s ease; }

/* ── NAV DOTS ── */
.quiz-nav {
  display: flex; gap: 5px; padding: 10px 28px;
  overflow-x: auto; border-bottom: 1px solid var(--border);
  background: var(--surface); scrollbar-width: none;
}
.quiz-nav::-webkit-scrollbar { display: none; }
.nav-dot {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg);
  font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.nav-dot:hover { border-color: var(--accent); color: var(--accent); }
.nav-dot.active { background: var(--accent); border-color: var(--accent); color: white; }
.nav-dot.nav-correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
.nav-dot.nav-wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }

/* ── MAIN LAYOUT ── */
.quiz-layout {
  display: grid;
  grid-template-columns: 1fr 400px;
  align-items: start;
}

/* ── LEFT PANEL ── */
/* Grows freely — page scrolls naturally */
.left-panel {
  padding: 28px 32px;
  border-right: 1px solid var(--border);
}
.question-label {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
}
.question-text {
  font-size: 15px; font-weight: 500; line-height: 1.6;
  margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}

/* ── TABLES ── */
.table-section { margin-bottom: 24px; }
.table-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px;
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.fin-table th {
  text-align: right; font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  color: var(--text-muted); padding: 6px 10px;
  border-bottom: 1.5px solid var(--border-strong); background: var(--bg);
}
.fin-table th:first-child { text-align: left; }
.fin-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
.fin-table td:not(:first-child) { text-align: right; font-family: var(--font-mono); font-size: 12px; }
.fin-table tr:hover td { background: var(--bg); }
.fin-table tr.subtotal td { border-top: 1px solid var(--border-strong); font-weight: 600; }
.fin-table tr.total td { border-top: 2px solid var(--text); border-bottom: 2px solid var(--text); font-weight: 700; }

/* ── CHOICES ── */
.choices-section { margin-top: 20px; }
.choices-label {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.choice-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: 7px;
  cursor: pointer; background: var(--surface); user-select: none;
  transition: border-color .15s, background .15s, transform .2s ease;
}
.choice-item:hover:not(.disabled) { border-color: var(--accent); background: var(--accent-light); transform: translateX(3px); }
.choice-item:active:not(.disabled) { transform: scale(.97); }
.choice-item.disabled { cursor: default; }
.choice-item.ch-correct { border-color: var(--correct); background: var(--correct-bg); animation: correctPop .35s ease forwards; }
.choice-item.ch-wrong { border-color: var(--wrong); background: var(--wrong-bg); animation: wrongShake .4s ease forwards; }
.choice-item.ch-dimmed { opacity: .4; }

@keyframes correctPop { 0%{transform:scale(1)} 40%{transform:scale(1.025)} 100%{transform:scale(1)} }
@keyframes wrongShake { 0%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} 100%{transform:translateX(0)} }

.choice-letter {
  width: 24px; height: 24px; border-radius: 6px;
  border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: var(--text-muted); flex-shrink: 0; transition: all .2s;
}
.choice-item.ch-correct .choice-letter { background: var(--correct); border-color: var(--correct); color: white; }
.choice-item.ch-wrong   .choice-letter { background: var(--wrong);   border-color: var(--wrong);   color: white; }
.choice-item:hover:not(.disabled):not(.ch-correct):not(.ch-wrong) .choice-letter { background: var(--accent); border-color: var(--accent); color: white; }
.choice-text { font-size: 13px; flex: 1; }
.choice-icon { font-size: 15px; flex-shrink: 0; }

/* ── RIGHT PANEL ── */
/* Sticky column — sticks below header+progressbar+nav.
   overflow-y:auto lets it scroll internally when content is taller than viewport.
   Tool cards must NOT use overflow:hidden so content isn't clipped. */
.right-panel {
  position: sticky;
  top: 101px; /* 52px header + 3px progress bar + 46px nav */
  height: calc(100vh - 101px);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 20px;
  background: var(--surface);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.panel-section-title {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}

/* ── ACCORDION TOOL CARDS ── */
.tool-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  /* NO overflow:hidden — that was clipping expanded content */
  margin-bottom: 8px;
  transition: box-shadow .15s;
}
.tool-card:last-child { margin-bottom: 0; }

.tool-trigger {
  width: 100%; padding: 11px 14px;
  border: none;
  border-radius: var(--radius); /* rounded when closed */
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background .15s;
  text-align: left;
}
/* When open, only round the top corners */
.tool-trigger.open {
  border-radius: var(--radius) var(--radius) 0 0;
  border-bottom: 1px solid var(--border);
}
.tool-trigger:hover { background: #f0eeea; }

/* colour variants */
.tool-card.eq   .tool-trigger { background: var(--info-light); color: var(--info); }
.tool-card.eq   .tool-trigger:hover { background: #dce9f9; }
.tool-card.eq   .tool-trigger.open  { background: var(--info-light); border-bottom-color: #c5d8f7; }
.tool-card.hint .tool-trigger { background: var(--warn-light); color: var(--warn); }
.tool-card.hint .tool-trigger:hover { background: #fce9d4; }
.tool-card.hint .tool-trigger.open  { background: var(--warn-light); border-bottom-color: #f5d5b8; }
.tool-card.solution .tool-trigger.open { border-bottom-color: #c8ebd8; }

.tool-body {
  padding: 14px;
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  background: var(--surface);
  animation: accordionIn .18s ease;
}
@keyframes accordionIn {
  from { opacity: 0; transform: translateY(-3px); }
  to   { opacity: 1; transform: translateY(0); }
}

.btn-icon { font-size: 15px; flex-shrink: 0; }
.btn-label { flex: 1; }
.btn-arrow {
  font-size: 11px; opacity: .5;
  transition: transform .2s ease;
  display: inline-block;
}
.tool-trigger.open .btn-arrow { transform: rotate(180deg); opacity: .7; }

/* ── STANDALONE ACTION BUTTONS (Next, etc.) ── */
.action-btn {
  width: 100%; padding: 11px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: all .15s; text-align: left;
}
.action-btn:hover { border-color: var(--border-strong); background: var(--surface); box-shadow: var(--shadow-sm); }
.action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.action-btn.primary:hover { background: var(--accent-hover); }

/* ── INLINE PANELS (kept for mobile modal use) ── */
.inline-panel { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: accordionIn .18s ease; }
@keyframes slideDown { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.inline-panel-header {
  padding: 8px 13px; background: var(--bg); border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .8px;
  display: flex; justify-content: space-between; align-items: center;
}
.close-btn { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 17px; line-height: 1; padding: 0; }
.close-btn:hover { color: var(--text); }
.inline-panel-body { padding: 13px; }

/* Equation */
.equation-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.equation-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; overflow-x: auto; }

/* Hints */
.hint-step { display: flex; gap: 11px; margin-bottom: 10px; align-items: flex-start; }
.hint-num { width: 21px; height: 21px; border-radius: 50%; background: var(--accent); color: white; font-family: var(--font-mono); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.hint-text { font-size: 13px; line-height: 1.5; }
.hint-formula { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; margin-top: 5px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }

/* Answer / Solution */
.answer-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: slideDown .18s ease; }
.answer-header { padding: 8px 13px; background: #f0faf4; border-bottom: 1px solid #c8ebd8; font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--accent); text-transform: uppercase; letter-spacing: .8px; }
.answer-body { padding: 13px; }
.answer-result { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: var(--accent); text-align: center; padding: 13px; background: #f0faf4; border-radius: 8px; border: 1px solid #c8ebd8; margin-bottom: 11px; }
.answer-explanation { font-size: 13px; color: var(--text-muted); background: var(--info-light); border: 1px solid #c5d8f7; border-radius: 8px; padding: 10px 13px; line-height: 1.6; }
.answer-step { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; font-size: 13px; }
.step-label { font-family: var(--font-mono); font-size: 10px; background: var(--border); color: var(--text-muted); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; }
.answer-explanation strong { display: block; font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; color: var(--info); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 2px 0; }

/* ── CALCULATOR ── */
.calc-display { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; margin-bottom: 7px; text-align: right; font-family: var(--font-mono); font-size: 20px; font-weight: 500; min-height: 50px; word-break: break-all; }
.calc-expression { font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 2px; }
.calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.calc-btn { padding: 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: center; }
.calc-btn:hover { background: var(--surface); border-color: var(--border-strong); }
.calc-btn:active { transform: scale(.92); }
.calc-btn.op { background: var(--info-light); color: var(--info); border-color: #c5d8f7; }
.calc-btn.eq { background: var(--accent); color: white; border-color: var(--accent); grid-column: span 2; }
.calc-btn.clear { background: var(--warn-light); color: var(--warn); border-color: #f5d5b8; }
.calc-btn.zero { grid-column: span 2; }

/* ── PROGRESS MINI ── */
.progress-mini { margin-top: 4px; padding: 10px 13px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
.progress-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 7px; }
.progress-dot { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--font-mono); cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: var(--surface); color: var(--text-faint); }
.progress-dot:hover { border-color: var(--accent); color: var(--accent); }
.progress-dot.pd-active { background: var(--accent); border-color: var(--accent); color: white; }
.progress-dot.pd-correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
.progress-dot.pd-wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }

/* ═══════════════════════════════════════
   FEEDBACK MODAL
═══════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(15,14,13,.55);
  backdrop-filter: blur(3px);
  z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: backdropIn .2s ease;
}
@keyframes backdropIn { from{opacity:0} to{opacity:1} }

.modal-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 440px;
  overflow: hidden;
  animation: modalIn .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(.86) translateY(14px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-card.closing { animation: modalOut .18s ease forwards; }
@keyframes modalOut { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(.92)} }

.modal-card.correct-modal .modal-top { background: var(--correct-bg); border-bottom: 1px solid var(--correct-border); }
.modal-card.wrong-modal   .modal-top { background: var(--wrong-bg);   border-bottom: 1px solid var(--wrong-border); }

.modal-top { padding: 26px 28px 18px; text-align: center; }
.modal-icon { font-size: 44px; margin-bottom: 10px; animation: iconBounce .4s .08s ease both; }
@keyframes iconBounce { from{transform:scale(0);opacity:0} 60%{transform:scale(1.28)} to{transform:scale(1);opacity:1} }
.modal-verdict { font-family: var(--font-serif); font-size: 30px; margin-bottom: 6px; }
.modal-card.correct-modal .modal-verdict { color: var(--correct); }
.modal-card.wrong-modal   .modal-verdict { color: var(--wrong); }
.modal-subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

.modal-body { padding: 18px 28px; }
.modal-explanation { font-size: 13px; line-height: 1.65; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; margin-bottom: 14px; }
.modal-explanation strong { display: block; font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; color: var(--text-faint); }
.modal-answer-reveal { font-family: var(--font-mono); font-size: 15px; font-weight: 600; text-align: center; padding: 11px; background: var(--correct-bg); border: 1px solid var(--correct-border); border-radius: 9px; color: var(--correct); margin-bottom: 14px; }
.modal-hint-box { background: var(--warn-light); border: 1px solid #f5d5b8; border-radius: 10px; padding: 13px 15px; margin-bottom: 14px; }
.modal-hint-box strong { font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .8px; color: var(--warn); display: block; margin-bottom: 8px; }
.hint-item { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; font-size: 13px; }
.hint-badge { background: var(--warn); color: white; border-radius: 4px; font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; flex-shrink: 0; margin-top: 2px; }
.hint-formula-sm { font-family: var(--font-mono); font-size: 12px; color: var(--warn); margin-top: 3px; }

.modal-footer { padding: 0 28px 22px; display: flex; gap: 8px; }
.modal-btn { flex: 1; padding: 12px 16px; border-radius: 10px; border: none; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.modal-btn.next { background: var(--accent); color: white; }
.modal-btn.next:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,106,79,.3); }
.modal-btn.retry { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
.modal-btn.retry:hover { border-color: var(--border-strong); background: var(--surface); }

/* ═══════════════════════════════════════
   RESULTS SCREEN
═══════════════════════════════════════ */
.results-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100vh - 52px - 3px - 46px);
  padding: 40px 20px; text-align: center;
  animation: slideDown .3s ease;
}
.results-trophy { font-size: 64px; margin-bottom: 8px; animation: iconBounce .5s ease both; }
.results-title { font-family: var(--font-serif); font-size: 36px; color: var(--text); margin-bottom: 6px; }
.results-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

.results-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 32px 40px;
  width: 100%; max-width: 440px; margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.results-score {
  font-family: var(--font-mono); font-size: 56px; font-weight: 600;
  color: var(--accent); line-height: 1; margin-bottom: 6px;
}
.results-score-label { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.results-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 28px; }
.results-stat { text-align: center; }
.results-stat-num { font-family: var(--font-mono); font-size: 24px; font-weight: 600; margin-bottom: 3px; }
.results-stat-num.green { color: var(--correct); }
.results-stat-num.red { color: var(--wrong); }
.results-stat-num.blue { color: var(--info); }
.results-stat-label { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .8px; }

.results-message { font-size: 14px; line-height: 1.6; color: var(--text-muted); padding: 14px 16px; background: var(--accent-light); border: 1px solid var(--correct-border); border-radius: var(--radius); }
.results-actions { display: flex; gap: 10px; width: 100%; max-width: 440px; }
.results-btn { flex: 1; padding: 13px 20px; border-radius: var(--radius); font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; border: none; }
.results-btn.primary { background: var(--accent); color: white; }
.results-btn.primary:hover { background: var(--accent-hover); }
.results-btn.secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
.results-btn.secondary:hover { border-color: var(--border-strong); }

/* ── KATEX ── */
.katex { font-size: 1em !important; }
.katex-display { margin: 4px 0 !important; overflow-x: auto; }

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media (max-width: 768px) {
  .quiz-layout {
    display: block; /* single column, no grid */
  }
  .left-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 20px 16px;
  }
  .right-panel {
    position: static;   /* no sticky */
    height: auto;       /* no fixed height */
    overflow: visible;  /* no internal scroll */
    padding: 20px 16px;
  }
  .quiz-nav, .app-header { padding-left: 16px; padding-right: 16px; }
  .modal-backdrop { align-items: flex-end; padding: 0; }
  .modal-card {
    max-width: 100%;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    animation: modalUp .28s cubic-bezier(.34,1.3,.64,1);
  }
  @keyframes modalUp { from{transform:translateY(100%);opacity:.8} to{transform:translateY(0);opacity:1} }
  .results-card { padding: 24px 20px; }
  .results-score { font-size: 44px; }
}

        setDisplay(parseFloat(result.toFixed(10)).toString());
        setHasResult(true);
      } catch { setDisplay("Error"); }
      return;
    }
    if (val === "±") { setDisplay(d => d.startsWith("-") ? d.slice(1) : "-"+d); return; }
    if (val === "%") { setDisplay(d => String(parseFloat(d)/100)); return; }
    const ops = ["+","−","×","÷","."];
    if (hasResult && !ops.includes(val)) { setDisplay(val); setExpression(""); setHasResult(false); }
    else { setDisplay(d => (d === "0" && !ops.includes(val)) ? val : d+val); if (hasResult) setHasResult(false); }
  };

  const rows = [["C","±","%","÷"],["7","8","9","×"],["4","5","6","−"],["1","2","3","+"],["0",".","⌫","="]];
  return (
    <div>
      <div className="calc-display">
        <span className="calc-expression">{expression}</span>
        {display}
      </div>
      <div className="calc-grid">
        {rows.map((row, ri) => row.map((btn, bi) => {
          const isOp    = ["÷","×","−","+"].includes(btn);
          const isEq    = btn === "=";
          const isClear = btn === "C";
          const isZero  = btn === "0" && bi === 0 && ri === 4;
          return (
            <button
              key={`${ri}-${bi}`}
              className={`calc-btn${isOp?" op":""}${isEq?" eq":""}${isClear?" clear":""}${isZero?" zero":""}`}
              onClick={() => handle(btn)}
            >{btn}</button>
          );
        }))}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   COMPONENT — Results Screen
───────────────────────────────────────────── */
function ResultsScreen({ questions, answeredMap, onRestart, onReview }) {
  const total   = questions.length;
  const answered = Object.keys(answeredMap).length;
  const correct = questions.filter(q => answeredMap[q.id] === q.answer).length;
  const wrong   = answered - correct;
  const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;

  const getMessage = () => {
    if (pct === 100) return "Perfect score! You've mastered this material. 🌟";
    if (pct >= 80)  return "Excellent work! You have a strong grasp of the concepts. Keep it up!";
    if (pct >= 60)  return "Good effort! Review the questions you missed and try again.";
    if (pct >= 40)  return "Keep practicing! Focus on the formulas and step-by-step solutions.";
    return "Don't give up! Review the hint and solution panels — they're there to help you.";
  };

  const getTrophy = () => {
    if (pct === 100) return "🏆";
    if (pct >= 80)  return "🥇";
    if (pct >= 60)  return "🥈";
    if (pct >= 40)  return "🥉";
    return "📚";
  };

  return (
    <div className="results-screen">
      <div className="results-trophy">{getTrophy()}</div>
      <div className="results-title">Quiz Complete!</div>
      <div className="results-subtitle">Here's how you did on all {total} questions</div>

      <div className="results-card">
        <div className="results-score">{pct}%</div>
        <div className="results-score-label">Overall Score</div>

        <div className="results-stats">
          <div className="results-stat">
            <div className="results-stat-num green">{correct}</div>
            <div className="results-stat-label">Correct</div>
          </div>
          <div className="results-stat">
            <div className="results-stat-num red">{wrong}</div>
            <div className="results-stat-label">Wrong</div>
          </div>
          <div className="results-stat">
            <div className="results-stat-num blue">{total - answered}</div>
            <div className="results-stat-label">Skipped</div>
          </div>
        </div>

        <div className="results-message">{getMessage()}</div>
      </div>

      <div className="results-actions">
        <button className="results-btn secondary" onClick={onReview}>Review Answers</button>
        <button className="results-btn primary"   onClick={onRestart}>Try Again 🔄</button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   COMPONENT — Quiz Page
───────────────────────────────────────────── */
function QuizPage({ question, questionIdx, total, answeredMap, onAnswer, onNext, onJump }) {
  const [showEq,     setShowEq]     = useState(false);
  const [showHint,   setShowHint]   = useState(false);
  const [showCalc,   setShowCalc]   = useState(false);
  const [showAnswer, setShowAnswer] = useState(false);
  const [selected,   setSelected]   = useState(null);
  const [revealed,   setRevealed]   = useState(false);
  const [modal,      setModal]      = useState(null); // null | "correct" | "wrong"
  const leftRef = useRef();

  // Reset state when question changes
  useEffect(() => {
    setShowEq(false); setShowHint(false); setShowCalc(false);
    setShowAnswer(false); setModal(null);
    const prev = answeredMap[question.id];
    if (prev !== undefined) { setSelected(prev); setRevealed(true); }
    else { setSelected(null); setRevealed(false); }
    if (leftRef.current) leftRef.current.scrollTop = 0;
  }, [question.id]);

  const handleChoice = (i) => {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
    onAnswer(question.id, i);
    setTimeout(() => setModal(i === question.answer ? "correct" : "wrong"), 220);
  };

  const handleRetry = () => {
    setSelected(null); setRevealed(false); setModal(null);
    onAnswer(question.id, undefined);
  };

  const handleModalNext = () => { setModal(null); onNext(); };

  const toggle = (panel) => {
    if (panel === "eq")   { setShowEq(v => !v);   setShowHint(false); setShowCalc(false); }
    if (panel === "hint") { setShowHint(v => !v); setShowEq(false);   setShowCalc(false); }
    if (panel === "calc") { setShowCalc(v => !v); setShowEq(false);   setShowHint(false); }
  };

  const getChoiceClass = (i) => {
    if (!revealed) return "";
    if (i === question.answer) return "ch-correct";
    if (i === selected && i !== question.answer) return "ch-wrong";
    return "ch-dimmed";
  };

  const letters = ["A","B","C","D","E"];
  const isLast  = questionIdx === total - 1;

  return (
    <>
      <div className="quiz-layout">
        {/* ── LEFT: Question + Table + Choices ── */}
        <div className="left-panel" ref={leftRef}>
          <div className="question-label">Question {questionIdx + 1} of {total}</div>
          <div className="question-text">{question.question}</div>

          {(question.tables || []).map((t, i) => <FinTable key={i} table={t} />)}

          {question.choices.length > 0 && (
            <div className="choices-section">
              <div className="choices-label">Select your answer</div>
              {question.choices.map((c, i) => (
                <div
                  key={i}
                  className={`choice-item ${getChoiceClass(i)} ${revealed ? "disabled" : ""}`}
                  onClick={() => handleChoice(i)}
                >
                  <div className="choice-letter">{letters[i]}</div>
                  <div className="choice-text">{c}</div>
                  {revealed && i === question.answer && <span className="choice-icon">✓</span>}
                  {revealed && i === selected && i !== question.answer && <span className="choice-icon">✗</span>}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── RIGHT: Tools ── */}
        <div className="right-panel">
          <div className="panel-section-title">Tools</div>

          <button className="action-btn secondary" onClick={() => toggle("eq")}>
            <span className="btn-icon">∑</span>
            <span className="btn-label">Equation</span>
            <span className="btn-arrow">{showEq ? "▲" : "▼"}</span>
          </button>
          {showEq && <EquationPanel eq={question.equation} onClose={() => setShowEq(false)} />}

          <button className="action-btn warn-btn" onClick={() => toggle("hint")}>
            <span className="btn-icon">💡</span>
            <span className="btn-label">Hint</span>
            <span className="btn-arrow">{showHint ? "▲" : "▼"}</span>
          </button>
          {showHint && <HintPanel hints={question.hints} onClose={() => setShowHint(false)} />}

          <button className="action-btn" onClick={() => toggle("calc")}>
            <span className="btn-icon">⌗</span>
            <span className="btn-label">Calculator</span>
            <span className="btn-arrow">{showCalc ? "▲" : "▼"}</span>
          </button>
          {showCalc && (
            <div className="inline-panel">
              <div className="inline-panel-header">
                <span>⌗ Calculator</span>
                <button className="close-btn" onClick={() => setShowCalc(false)}>×</button>
              </div>
              <div className="inline-panel-body"><Calculator /></div>
            </div>
          )}

          <div className="divider" />

          <button className="action-btn" onClick={() => setShowAnswer(v => !v)}>
            <span className="btn-icon">🔍</span>
            <span className="btn-label">Show Solution</span>
            <span className="btn-arrow">{showAnswer ? "▲" : "▼"}</span>
          </button>
          {showAnswer && <AnswerPanel solution={question.solution} />}

          <div style={{ flex: 1 }} />

          <button className="action-btn primary" onClick={onNext}>
            <span className="btn-icon">{isLast ? "🏁" : "→"}</span>
            <span className="btn-label">{isLast ? "Finish Quiz" : "Next Question"}</span>
          </button>

          {/* Progress dots */}
          <div className="progress-mini">
            <div className="panel-section-title">Progress</div>
            <div className="progress-dots">
              {Array.from({ length: total }, (_, i) => {
                // We need question ids — passed via answeredMap keys context
                return null; // rendered in App with full questions array
              })}
            </div>
          </div>
        </div>
      </div>

      {/* Feedback modal */}
      {modal && (
        <FeedbackModal
          isCorrect={modal === "correct"}
          question={question}
          onNext={handleModalNext}
          onRetry={handleRetry}
          onClose={() => setModal(null)}
          isLast={isLast}
        />
      )}
    </>
  );
}

/* ─────────────────────────────────────────────
   COMPONENT — App (root)
───────────────────────────────────────────── */
function App() {
  /* ── State ── */
  const [questions,    setQuestions]    = useState([]);     // loaded from JSON
  const [loadState,    setLoadState]    = useState("loading"); // "loading"|"error"|"ready"
  const [errorMsg,     setErrorMsg]     = useState("");
  const [currentIdx,   setCurrentIdx]   = useState(0);
  const [answeredMap,  setAnsweredMap]  = useState({});     // { questionId: choiceIndex }
  const [showResults,  setShowResults]  = useState(false);

  /* ── Load questions.json ── */
  useEffect(() => {
    Promise.resolve(new Response(document.getElementById("questions-data").textContent))
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status} — could not load questions.json`);
        return res.json();
      })
      .then(data => {
        if (!Array.isArray(data) || data.length === 0) throw new Error("questions.json is empty or malformed.");
        setQuestions(data);
        setLoadState("ready");
      })
      .catch(err => {
        setErrorMsg(err.message);
        setLoadState("error");
      });
  }, []);

  /* ── Handlers ── */
  const handleNext = useCallback(() => {
    if (currentIdx >= questions.length - 1) {
      setShowResults(true);
    } else {
      setCurrentIdx(i => i + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }, [currentIdx, questions.length]);

  const handleJump = useCallback((i) => {
    setCurrentIdx(i);
    setShowResults(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, []);

  const handleAnswer = useCallback((id, choice) => {
    setAnsweredMap(m => {
      if (choice === undefined) {
        const next = { ...m };
        delete next[id];
        return next;
      }
      return { ...m, [id]: choice };
    });
  }, []);

  const handleRestart = useCallback(() => {
    setCurrentIdx(0);
    setAnsweredMap({});
    setShowResults(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, []);

  const handleReview = useCallback(() => {
    setCurrentIdx(0);
    setShowResults(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, []);

  /* ── Derived values ── */
  const question     = questions[currentIdx];
  const total        = questions.length;
  const correctCount = questions.filter(q => answeredMap[q.id] === q.answer).length;
  const progress     = total > 0 ? ((currentIdx) / total) * 100 : 0;

  /* ── Loading / Error states ── */
  if (loadState === "loading") {
    return (
      <div className="loading-screen">
        <div className="loading-spinner" />
        <div className="loading-label">Loading questions…</div>
      </div>
    );
  }

  if (loadState === "error") {
    return (
      <div className="error-screen">
        <div className="error-icon">⚠️</div>
        <div className="error-title">Failed to load questions</div>
        <div className="error-msg">{errorMsg}<br/><br/>Make sure <code>data/questions.json</code> exists and the app is served from a web server (not opened as a file://).</div>
        <button className="error-btn" onClick={() => window.location.reload()}>Retry</button>
      </div>
    );
  }

  /* ── Render ── */
  return (
    <div>
      {/* Header */}
      <header className="app-header">
        <div className="app-logo">Finance<span>Quiz</span></div>
        <div className="header-meta">
          <div className={`quiz-counter ${correctCount > 0 ? "good" : ""}`}>
            ✓ {correctCount}/{Object.keys(answeredMap).length}
          </div>
          <div className="quiz-counter">
            {showResults ? "Results" : `Q${currentIdx + 1}/${total}`}
          </div>
        </div>
      </header>

      {/* Progress bar */}
      <div className="progress-bar">
        <div className="progress-fill" style={{ width: (showResults ? 100 : progress) + "%" }} />
      </div>

      {/* Nav dots */}
      <div className="quiz-nav">
        {questions.map((q, i) => {
          const a   = answeredMap[q.id];
          const cls = a === undefined ? "" : a === q.answer ? "nav-correct" : "nav-wrong";
          return (
            <button
              key={q.id}
              className={`nav-dot ${cls} ${!showResults && i === currentIdx ? "active" : ""}`}
              onClick={() => handleJump(i)}
              title={`Question ${i + 1}`}
            >{i + 1}</button>
          );
        })}
        {showResults && (
          <button className="nav-dot active" style={{ width: "auto", padding: "0 10px" }}>Results</button>
        )}
      </div>

      {/* Main content */}
      {showResults ? (
        <ResultsScreen
          questions={questions}
          answeredMap={answeredMap}
          onRestart={handleRestart}
          onReview={handleReview}
        />
      ) : question ? (
        /* Render quiz page — inject progress dots here with full questions context */
        <QuizPageWithDots
          question={question}
          questionIdx={currentIdx}
          total={total}
          answeredMap={answeredMap}
          onAnswer={handleAnswer}
          onNext={handleNext}
          onJump={handleJump}
          questions={questions}
        />
      ) : null}
    </div>
  );
}

  return (

        <div className="left-panel" ref={leftRef}>
          <div className="question-label">Question {questionIdx + 1} of {total}</div>

            <div className="choices-section">

              {question.choices.map((c, i) => (
                <div key={i}

                  onClick={() => handleChoice(i)}
                >
                  <div className="choice-letter">{letters[i]}</div>
                  <div className="choice-text">{c}</div>
                  {revealed && i === question.answer && <span className="choice-icon">✓</span>}
                  {revealed && i === selected && i !== question.answer && <span className="choice-icon">✗</span>}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* RIGHT — sticky accordion panel */}
        <div className="right-panel">
          <div className="panel-section-title">Tools</div>

          {/* ── Equation accordion card ── */}
          <div className="tool-card eq">
            <button className={`tool-trigger${showEq?" open":""}`} onClick={() => toggle("eq")}>
              <span className="btn-icon">∑</span>
              <span className="btn-label">Equation</span>
              <span className="btn-arrow">▼</span>
            </button>
            {showEq && (
              <div className="tool-body">
                <EquationBody eq={question.equation} />
              </div>
            )}
          </div>

          {/* ── Hint accordion card ── */}
          <div className="tool-card hint">
            <button className={`tool-trigger${showHint?" open":""}`} onClick={() => toggle("hint")}>
              <span className="btn-icon">💡</span>
              <span className="btn-label">Hint</span>
              <span className="btn-arrow">▼</span>
            </button>
            {showHint && (
              <div className="tool-body">
                <HintBody hints={question.hints} />
              </div>
            )}
          </div>

          {/* ── Calculator accordion card ── */}
          <div className="tool-card calc">
            <button className={`tool-trigger${showCalc?" open":""}`} onClick={() => toggle("calc")}>
              <span className="btn-icon">⌗</span>
              <span className="btn-label">Calculator</span>
              <span className="btn-arrow">▼</span>
            </button>
            {showCalc && (
              <div className="tool-body">
                <Calculator />
              </div>
            )}
          </div>

          {/* ── Solution accordion card ── */}
          <div className="tool-card solution" style={{marginBottom:"12px"}}>
            <button className={`tool-trigger${showAnswer?" open":""}`} onClick={() => setShowAnswer(v => !v)}>
              <span className="btn-icon">🔍</span>
              <span className="btn-label">Show Solution</span>
              <span className="btn-arrow">▼</span>
            </button>
            {showAnswer && (
              <div className="tool-body" style={{padding:0}}>
                <AnswerPanel solution={question.solution} />
              </div>
            )}
          </div>

          {/* ── Next button ── */}
          <button className="action-btn primary" onClick={onNext} style={{marginBottom:"12px"}}>
            <span className="btn-icon">{isLast ? "🏁" : "→"}</span>
            <span className="btn-label">{isLast ? "Finish Quiz" : "Next Question"}</span>
          </button>

          {/* ── Progress dots ── */}
          <div className="progress-mini">
            <div className="panel-section-title">Progress</div>
            <div className="progress-dots">
              {questions.map((q, i) => {
                const a   = answeredMap[q.id];
                const cls = a === undefined ? "" : a === q.answer ? "pd-correct" : "pd-wrong";
                return (
                  <div key={q.id}
                    className={`progress-dot ${cls} ${i === questionIdx ? "pd-active" : ""}`}
                    onClick={() => onJump(i)}
                    title={`Q${i + 1}`}
                  >{i + 1}</div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {modal && (
        <FeedbackModal
          isCorrect={modal === "correct"}
          question={question}
          onNext={handleModalNext}
          onRetry={handleRetry}
          onClose={() => setModal(null)}
          isLast={isLast}
        />
      )}
    </>
  );
}

/* ─────────────────────────────────────────────
   MOUNT
───────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
